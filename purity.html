<!DOCTYPE html>
<html lang="en">
<head>
<script src="lock.js"></script>
<script src="/api/config"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050506">
<title>Purity · Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="sync.js" defer></script>
<script src="topbar.js" defer></script>
<style>
:root {
  --text-primary: #FAFAFA;
  --text-secondary: #B8B6B0;
  --text-tertiary: #76746E;
  --success: #6BE3A4;
  --warning: #F2C063;
  --danger:  #FF6B6B;
  --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  background: #050506;
  color: var(--text-secondary);
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
  -webkit-text-size-adjust: 100%;
}
body {
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
  padding: max(28px, env(safe-area-inset-top)) 20px 60px;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(circle at 25% 15%, rgba(107, 227, 164, 0.07), transparent 50%),
    radial-gradient(circle at 75% 85%, rgba(167, 139, 250, 0.06), transparent 50%);
  filter: blur(40px);
  pointer-events: none; z-index: -2;
  animation: drift 36s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.014) 1px, transparent 1px);
  background-size: 3px 3px;
  pointer-events: none; z-index: -1;
}
@keyframes drift {
  0%   { transform: translate3d(0,0,0); }
  100% { transform: translate3d(-22px,14px,0); }
}

.page { max-width: 680px; margin: 0 auto; }

.dash-title {
  margin: 0 0 14px;
  font-size: 28px; font-weight: 700; letter-spacing: -0.025em;
  background: linear-gradient(180deg,#FFFFFF 0%,#C7C4BC 120%);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
  display: flex; align-items: center; gap: 10px;
}
.title-cross { font-style: normal; -webkit-text-fill-color: #C7C4BC; }

.section { margin-top: 8px; }
.section-title {
  font-size: 10.5px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-tertiary);
  display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
}
.section-title::before { content:''; width:18px; height:1px; background:var(--text-tertiary); opacity:.6; }
.section-title::after  { content:''; flex:1; height:1px; background:linear-gradient(90deg,rgba(255,255,255,.08),transparent); }

.gm-card {
  position: relative;
  background: rgba(255,255,255,0.04);
  border-radius: 16px; padding: 20px; margin-bottom: 14px;
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  box-shadow: 0 12px 40px rgba(0,0,0,.45);
  overflow: hidden;
}

/* ── Streak card ─────────────────────────────────────── */
.streak-card { text-align: center; padding: 36px 20px 28px; }
.streak-cross {
  font-size: 36px; margin-bottom: 10px; display: block;
  filter: drop-shadow(0 0 18px rgba(107,227,164,0.25));
}
.streak-num {
  font-size: 80px; font-weight: 700; line-height: 1;
  letter-spacing: -0.04em; color: var(--text-primary);
  font-variant-numeric: tabular-nums;
}
.streak-label {
  font-size: 12px; font-weight: 700; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--text-tertiary);
  margin-top: 4px; margin-bottom: 28px;
}
.streak-quote {
  max-width: 460px; margin: 0 auto;
  padding: 16px 18px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.07); border-radius: 12px;
}
.streak-quote-text {
  font-size: 14px; line-height: 1.65;
  color: var(--text-secondary); font-style: italic;
}
.streak-quote-ref {
  margin-top: 10px; font-size: 11px; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--text-tertiary);
}

/* ── Calendar ────────────────────────────────────────── */
.cal-header {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 8px; margin-bottom: 16px;
}
.cal-month-name {
  font-size: 17px; font-weight: 700;
  letter-spacing: -0.01em; color: var(--text-primary);
}
.cal-stats { font-size: 12px; color: var(--text-tertiary); font-weight: 600; }

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
}
.cal-dow {
  text-align: center; padding: 4px 0;
  font-size: 9px; font-weight: 700;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-tertiary);
}
.cal-day {
  aspect-ratio: 1; border-radius: 9px;
  border: 1px solid rgba(255,255,255,0.06);
  background: rgba(0,0,0,0.20);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1px; position: relative; cursor: default;
  transition: background .15s, border-color .15s, transform .1s;
  user-select: none; -webkit-tap-highlight-color: transparent;
}
.cal-day.cal-empty { background: transparent; border-color: transparent; pointer-events: none; }
.cal-day.cal-future { opacity: .22; pointer-events: none; }

/* Clean = green */
.cal-day.cal-clean {
  background: rgba(107,227,164,0.13);
  border-color: rgba(107,227,164,0.30);
}
.cal-day.cal-clean .cal-icon { color: var(--success); }

/* Failed = red-dimmed */
.cal-day.cal-failed {
  background: rgba(255,107,107,0.07);
  border-color: rgba(255,107,107,0.16);
}
.cal-day.cal-failed .cal-icon { color: rgba(255,107,107,0.45); }

/* Today (unchecked) — pulsing border */
.cal-day.cal-today:not(.cal-clean) {
  border-color: rgba(255,255,255,0.32);
  background: rgba(255,255,255,0.06);
  cursor: pointer;
  animation: day-pulse 2.4s ease-in-out infinite;
}
.cal-day.cal-today.cal-clean { cursor: pointer; }
.cal-day.cal-today:hover { transform: scale(1.06); }
@keyframes day-pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.12); }
  50%      { box-shadow: 0 0 0 5px rgba(255,255,255,0); }
}

.cal-day-num {
  font-size: 11px; font-weight: 700;
  color: var(--text-tertiary); line-height: 1;
}
.cal-day.cal-clean .cal-day-num,
.cal-day.cal-today .cal-day-num { color: var(--text-primary); }
.cal-icon {
  font-size: 9px; line-height: 1;
  font-weight: 800; color: transparent;
}

/* Progress bar */
.cal-progress-wrap {
  margin-top: 14px; height: 3px;
  background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden;
}
.cal-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--success), #34d399);
  border-radius: 2px; transition: width .5s ease;
}

/* ── Mark today button ───────────────────────────────── */
.mark-btn-wrap { margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.06); }
.mark-btn {
  width: 100%; padding: 14px;
  border: 0; border-radius: 12px;
  font-family: inherit; font-size: 14px; font-weight: 700;
  cursor: pointer; transition: all .15s;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), 0 4px 14px rgba(0,0,0,.35);
}
.mark-btn.unchecked {
  background: linear-gradient(180deg,#FFFFFF 0%,#E8E5DD 100%);
  color: #0A0A0B;
}
.mark-btn.unchecked:hover { filter: brightness(1.06); transform: translateY(-1px); }
.mark-btn.checked {
  background: linear-gradient(180deg, rgba(107,227,164,0.22) 0%, rgba(107,227,164,0.10) 100%);
  border: 1px solid rgba(107,227,164,0.35);
  color: var(--success);
  box-shadow: none;
}
.mark-btn.checked:hover {
  background: linear-gradient(180deg, rgba(107,227,164,0.14) 0%, rgba(107,227,164,0.07) 100%);
}
.mark-btn:active { transform: scale(0.98); }

/* ── Archive ─────────────────────────────────────────── */
.archive-card {
  background: rgba(255,255,255,0.035);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px; padding: 16px; margin-bottom: 10px;
}
.archive-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.archive-month-name { font-size: 15px; font-weight: 700; color: var(--text-primary); }
.archive-badge {
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.10em; text-transform: uppercase;
  padding: 4px 10px; border-radius: 6px;
}
.archive-badge.perfect { background: rgba(107,227,164,.12); color: var(--success); border: 1px solid rgba(107,227,164,.22); }
.archive-badge.good    { background: rgba(242,192,99,.10);  color: var(--warning); border: 1px solid rgba(242,192,99,.20); }
.archive-badge.miss    { background: rgba(255,107,107,.08); color: var(--danger);  border: 1px solid rgba(255,107,107,.18); }

.archive-mini-cal {
  display: grid; grid-template-columns: repeat(7,1fr); gap: 3px;
}
.archive-mini-day {
  aspect-ratio: 1; border-radius: 3px;
}
.archive-mini-day.clean  { background: rgba(107,227,164,0.50); }
.archive-mini-day.failed { background: rgba(255,107,107,0.25); }
.archive-mini-day.empty  { background: transparent; }

.archive-stats {
  margin-top: 10px; font-size: 12px; color: var(--text-tertiary);
}

.empty-archive {
  text-align: center; padding: 28px 20px;
  font-size: 13px; font-style: italic; color: var(--text-tertiary);
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 14px;
}

@media (max-width: 480px) {
  body { padding: max(20px, env(safe-area-inset-top)) 14px 50px; }
  .gm-card { padding: 16px; }
  .streak-num { font-size: 64px; }
  .streak-card { padding: 28px 16px 22px; }
  .cal-day { border-radius: 7px; }
  .cal-day-num { font-size: 10px; }
  .cal-icon { font-size: 8px; }
}
</style>
</head>
<body>
<div class="page">

  <h1 class="dash-title"><span class="title-cross">✝</span> Purity</h1>

  <!-- ── Streak + Quote ── -->
  <div class="section">
    <div class="section-title">Current Streak</div>
    <div class="gm-card streak-card">
      <span class="streak-cross">✝</span>
      <div class="streak-num" id="streakNum">0</div>
      <div class="streak-label">days clean</div>
      <div class="streak-quote">
        <div class="streak-quote-text" id="quoteText"></div>
        <div class="streak-quote-ref"  id="quoteRef"></div>
      </div>
    </div>
  </div>

  <!-- ── This month ── -->
  <div class="section">
    <div class="section-title" id="calSectionLabel">This Month</div>
    <div class="gm-card">
      <div class="cal-header">
        <div class="cal-month-name" id="calMonthName"></div>
        <div class="cal-stats" id="calStats"></div>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-progress-wrap">
        <div class="cal-progress-fill" id="calProgressFill" style="width:0%"></div>
      </div>
      <div class="mark-btn-wrap">
        <button class="mark-btn unchecked" id="markBtn" type="button">Mark Today Clean ✝</button>
      </div>
    </div>
  </div>

  <!-- ── Archive ── -->
  <div class="section">
    <div class="section-title">Past Months</div>
    <div id="archiveWrap"></div>
  </div>

</div>

<script>
(function () {
  'use strict';

  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  const DOWS   = ['S','M','T','W','T','F','S'];

  const QUOTES = [
    { text: 'Blessed are the pure in heart, for they shall see God.',                                                      ref: 'Matthew 5:8'          },
    { text: 'I can do all things through Christ who strengthens me.',                                                      ref: 'Philippians 4:13'     },
    { text: 'Create in me a pure heart, O God, and renew a steadfast spirit within me.',                                  ref: 'Psalm 51:10'          },
    { text: 'No temptation has overtaken you except what is common to mankind. God is faithful — he will not let you be tempted beyond what you can bear.', ref: '1 Corinthians 10:13' },
    { text: 'Whatever is true, whatever is noble, whatever is right, whatever is pure — think about such things.',         ref: 'Philippians 4:8'      },
    { text: 'Submit yourselves, then, to God. Resist the devil, and he will flee from you.',                               ref: 'James 4:7'            },
    { text: 'How can a young person stay on the path of purity? By living according to your word.',                        ref: 'Psalm 119:9'          },
    { text: 'The Lord is faithful, and he will strengthen you and protect you from the evil one.',                         ref: '2 Thessalonians 3:3'  },
    { text: 'Flee the evil desires of youth and pursue righteousness, faith, love and peace.',                             ref: '2 Timothy 2:22'       },
    { text: 'For God did not call us to be impure, but to live a holy life.',                                             ref: '1 Thessalonians 4:7'  },
    { text: 'Greater is he that is in you, than he that is in the world.',                                                ref: '1 John 4:4'           },
    { text: 'The grace of God teaches us to say No to ungodliness and worldly passions, and to live upright and godly lives.', ref: 'Titus 2:11-12'  },
    { text: 'Watch and pray so that you will not fall into temptation. The spirit is willing, but the flesh is weak.',    ref: 'Matthew 26:41'        },
    { text: 'You were bought at a price. Therefore honour God with your bodies.',                                         ref: '1 Corinthians 6:20'   },
    { text: 'Do not conform to the pattern of this world, but be transformed by the renewing of your mind.',              ref: 'Romans 12:2'          },
  ];

  // ── Helpers ──────────────────────────────────────────────────────────
  function pad2(n) { return String(n).padStart(2,'0'); }
  function todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate());
  }
  function currentMonthStr() {
    const d = new Date();
    return d.getFullYear() + '-' + pad2(d.getMonth()+1);
  }
  function daysInMonth(y, m)   { return new Date(y, m, 0).getDate(); }
  function firstDowOfMonth(y, m) { return new Date(y, m-1, 1).getDay(); } // 0=Sun

  // ── Storage ──────────────────────────────────────────────────────────
  function loadMonth(ym) {
    try { return JSON.parse(localStorage.getItem('purity:' + ym)) || { days: {} }; }
    catch(e) { return { days: {} }; }
  }
  function saveMonth(ym, data) {
    localStorage.setItem('purity:' + ym, JSON.stringify(data));
  }
  function loadArchive() {
    try { return JSON.parse(localStorage.getItem('purity_archive')) || []; }
    catch(e) { return []; }
  }
  function saveArchive(arr) {
    localStorage.setItem('purity_archive', JSON.stringify(arr));
  }

  // ── Archive past months on page load ────────────────────────────────
  function archivePast() {
    const cm = currentMonthStr();
    const toArchive = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('purity:') && !k.startsWith('purity_')) {
        const ym = k.slice('purity:'.length);
        if (ym < cm) toArchive.push(ym);
      }
    }
    if (!toArchive.length) return;
    const archive = loadArchive();
    const seen = new Set(archive.map(a => a.month));
    toArchive.forEach(ym => {
      if (seen.has(ym)) return;
      const [y, m] = ym.split('-').map(Number);
      const total  = daysInMonth(y, m);
      const data   = loadMonth(ym);
      let clean = 0;
      for (let d = 1; d <= total; d++) {
        const ds = ym + '-' + pad2(d);
        if (data.days[ds] && data.days[ds].clean) clean++;
      }
      archive.push({ month: ym, cleanDays: clean, totalDays: total, days: data.days });
      localStorage.removeItem('purity:' + ym);
      seen.add(ym);
    });
    archive.sort((a, b) => b.month.localeCompare(a.month));
    saveArchive(archive);
  }

  // ── Streak ───────────────────────────────────────────────────────────
  function calcStreak() {
    const today = todayStr();
    const cm    = currentMonthStr();
    const cur   = loadMonth(cm);
    const arch  = loadArchive();

    function isClean(ds) {
      const ym = ds.slice(0, 7);
      if (ym === cm) return !!(cur.days[ds] && cur.days[ds].clean);
      const a = arch.find(x => x.month === ym);
      return !!(a && a.days && a.days[ds] && a.days[ds].clean);
    }

    const d = new Date();
    // If today isn't checked yet, start counting from yesterday
    if (!isClean(today)) d.setDate(d.getDate() - 1);

    let streak = 0;
    for (let i = 0; i < 366; i++) {
      const ds = d.getFullYear() + '-' + pad2(d.getMonth()+1) + '-' + pad2(d.getDate());
      if (!isClean(ds)) break;
      streak++;
      d.setDate(d.getDate() - 1);
    }
    return streak;
  }

  // ── Daily quote (rotates each day) ───────────────────────────────────
  function dailyQuote() {
    const d = new Date();
    const doy = Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 86400000);
    return QUOTES[doy % QUOTES.length];
  }

  // ── Toggle today ──────────────────────────────────────────────────────
  function toggleToday() {
    const cm  = currentMonthStr();
    const ds  = todayStr();
    const data = loadMonth(cm);
    if (!data.days[ds]) data.days[ds] = {};
    const nowClean = !data.days[ds].clean;
    data.days[ds].clean = nowClean;
    if (nowClean) data.days[ds].checkedAt = Date.now();
    else delete data.days[ds].checkedAt;
    saveMonth(cm, data);
    renderAll();
  }

  // ── Render streak card ───────────────────────────────────────────────
  function renderStreak() {
    document.getElementById('streakNum').textContent = calcStreak();
    const q = dailyQuote();
    document.getElementById('quoteText').textContent = '“' + q.text + '”';
    document.getElementById('quoteRef').textContent  = '— ' + q.ref;
  }

  // ── Render calendar ──────────────────────────────────────────────────
  function renderCalendar() {
    const today = todayStr();
    const cm    = currentMonthStr();
    const [y, m] = cm.split('-').map(Number);
    const data  = loadMonth(cm);
    const total = daysInMonth(y, m);
    const firstDow = firstDowOfMonth(y, m);

    document.getElementById('calMonthName').textContent = MONTHS[m-1] + ' ' + y;

    const todayNum  = new Date().getDate();
    const elapsed   = todayNum; // days including today
    const cleanCnt  = Object.values(data.days).filter(d => d.clean).length;
    const failedCnt = elapsed - cleanCnt;
    const pct       = elapsed > 0 ? Math.round(cleanCnt / elapsed * 100) : 0;

    document.getElementById('calStats').textContent =
      cleanCnt + ' clean · ' + failedCnt + ' missed · ' + pct + '%';
    document.getElementById('calProgressFill').style.width = pct + '%';

    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    // Day-of-week headers
    DOWS.forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-dow';
      el.textContent = d;
      grid.appendChild(el);
    });

    // Empty cells before month starts
    for (let i = 0; i < firstDow; i++) {
      const el = document.createElement('div');
      el.className = 'cal-day cal-empty';
      grid.appendChild(el);
    }

    // Day cells
    for (let day = 1; day <= total; day++) {
      const ds      = cm + '-' + pad2(day);
      const isToday  = ds === today;
      const isPast   = ds < today;
      const isFuture = ds > today;
      const isClean  = !!(data.days[ds] && data.days[ds].clean);

      const el = document.createElement('div');
      el.className = 'cal-day';
      if (isFuture)       el.classList.add('cal-future');
      else if (isClean)   el.classList.add('cal-clean');
      else if (isPast)    el.classList.add('cal-failed');
      if (isToday)        el.classList.add('cal-today');

      const num = document.createElement('div');
      num.className = 'cal-day-num';
      num.textContent = day;

      const icon = document.createElement('div');
      icon.className = 'cal-icon';
      if (!isFuture) icon.textContent = isClean ? '✓' : '✕';

      el.appendChild(num);
      el.appendChild(icon);
      grid.appendChild(el);
    }

    // Mark button
    const todayClean = !!(data.days[today] && data.days[today].clean);
    const btn = document.getElementById('markBtn');
    btn.className = 'mark-btn ' + (todayClean ? 'checked' : 'unchecked');
    btn.textContent = todayClean ? '✓ Today marked clean — tap to undo' : 'Mark Today Clean ✝';
  }

  // ── Render archive ───────────────────────────────────────────────────
  function renderArchive() {
    const archive = loadArchive();
    const wrap    = document.getElementById('archiveWrap');
    if (!archive.length) {
      wrap.innerHTML = '<div class="empty-archive">No past months yet — your history will appear here at the start of each new month.</div>';
      return;
    }
    wrap.innerHTML = '';
    archive.forEach((a, ai) => {
      const [y, m] = a.month.split('-').map(Number);
      const pct    = Math.round(a.cleanDays / a.totalDays * 100);
      const badge  = a.cleanDays === a.totalDays ? 'perfect'
                   : pct >= 70 ? 'good' : 'miss';
      const label  = a.cleanDays === a.totalDays ? '✝ Perfect Month'
                   : pct + '% Clean';

      const card = document.createElement('div');
      card.className = 'archive-card';

      const header = document.createElement('div');
      header.className = 'archive-header';
      header.innerHTML =
        '<div class="archive-month-name">' + MONTHS[m-1] + ' ' + y + '</div>' +
        '<div class="archive-badge ' + badge + '">' + label + '</div>';

      const miniCal = document.createElement('div');
      miniCal.className = 'archive-mini-cal';

      const fdow = firstDowOfMonth(y, m);
      for (let i = 0; i < fdow; i++) {
        const e = document.createElement('div');
        e.className = 'archive-mini-day empty';
        miniCal.appendChild(e);
      }
      for (let d = 1; d <= a.totalDays; d++) {
        const ds     = a.month + '-' + pad2(d);
        const clean  = !!(a.days && a.days[ds] && a.days[ds].clean);
        const e      = document.createElement('div');
        e.className  = 'archive-mini-day ' + (clean ? 'clean' : 'failed');
        e.title      = ds + (clean ? ' — clean' : ' — missed');
        miniCal.appendChild(e);
      }

      const stats = document.createElement('div');
      stats.className = 'archive-stats';
      stats.textContent = a.cleanDays + ' of ' + a.totalDays + ' days clean';

      card.appendChild(header);
      card.appendChild(miniCal);
      card.appendChild(stats);
      wrap.appendChild(card);
    });
  }

  // ── Main render ──────────────────────────────────────────────────────
  function renderAll() {
    renderStreak();
    renderCalendar();
    renderArchive();
  }

  // ── Wire mark button ─────────────────────────────────────────────────
  document.getElementById('markBtn').addEventListener('click', toggleToday);

  // ── Boot ─────────────────────────────────────────────────────────────
  archivePast();
  renderAll();

  window.addEventListener('storage', renderAll);

  // Must be inside DOMContentLoaded — sync.js is defer'd and not yet defined
  // when this IIFE runs during HTML parsing.
  document.addEventListener('DOMContentLoaded', function () {
    if (window.initCloudSync) {
      window.initCloudSync({
        appKey: 'purity',
        syncedPrefixes: ['purity:'],
        syncedKeys: ['purity_archive'],
        onApplied: renderAll
      });
    }
  });
})();
</script>
</body>
</html>
